<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/config-enfant.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Sarina&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <title>Profil enfant</title>
</head>
<body>
    <header>
        <a href="../index.html" aria-label="Retour à l'accueil">
            <i class="material-symbols-outlined" id="houseicon">house</i>
        </a>
        <h1 id="title">Profil enfant</h1>
        <p id="session-status" class="session-status"></p>
    </header>

    <main class="config-main">
        <div class="config-grid">
            <!-- Left column: Identity card -->
            <section class="config-card config-card--identity">
                <h2 class="config-card__title">Identité</h2>
                <div class="profile-photo-wrap">
                    <div class="profile-photo" id="profile-photo" role="img" aria-label="Photo de l'enfant">
                        <span class="profile-photo-placeholder" aria-hidden="true">😊</span>
                        <img class="profile-photo-img" id="profile-photo-img" src="" alt="" hidden>
                    </div>
                    <input type="file" id="photo-input" accept="image/*" hidden>
                    <button type="button" class="btn btn--yellow btn--pill" id="btn-change-photo">Changer la photo</button>
                </div>
                <div class="config-fields">
                    <label class="config-label" for="input-prenom">Prénom</label>
                    <input type="text" id="input-prenom" class="config-input" placeholder="Prénom" autocomplete="given-name">
                    <label class="config-label" for="input-nom">Nom de famille</label>
                    <input type="text" id="input-nom" class="config-input" placeholder="Nom de famille" autocomplete="family-name">
                    <label class="config-label" for="input-dob">Date de naissance</label>
                    <input type="date" id="input-dob" class="config-input" autocomplete="bday">
                </div>
            </section>

            <!-- Right column: Tags + Programs -->
            <section class="config-card config-card--right">
                <h2 class="config-card__title">Profil thérapeutique</h2>
                <div class="tag-chips" id="tag-chips">
                    <button type="button" class="tag-chip" data-tag="Dyspraxie">Dyspraxie</button>
                    <button type="button" class="tag-chip" data-tag="TDAH">TDAH</button>
                    <button type="button" class="tag-chip" data-tag="Dysgraphie">Dysgraphie</button>
                    <button type="button" class="tag-chip" data-tag="Dyslexie">Dyslexie</button>
                    <button type="button" class="tag-chip" data-tag="Troubles de l'attention">Troubles de l'attention</button>
                    <button type="button" class="tag-chip" data-tag="Troubles moteurs">Troubles moteurs</button>
                    <button type="button" class="tag-chip tag-chip--add" id="tag-add" aria-label="Ajouter un tag">+</button>
                </div>

                <h2 class="config-card__title">Programmes assignés</h2>
                <div class="programs-grid" id="programs-grid">
                    <article class="program-card" data-program-id="1">
                        <div class="program-card__inner"></div>
                        <p class="program-card__name">Programme 1</p>
                        <a href="config-program.html?id=1" class="program-card__edit" aria-label="Modifier le programme">
                            <span class="material-symbols-outlined">edit</span>
                        </a>
                    </article>
                    <article class="program-card" data-program-id="2">
                        <div class="program-card__inner"></div>
                        <p class="program-card__name">Programme 2</p>
                        <a href="config-program.html?id=2" class="program-card__edit" aria-label="Modifier le programme">
                            <span class="material-symbols-outlined">edit</span>
                        </a>
                    </article>
                    <div class="program-card program-card--add" id="program-add" role="button" tabindex="0" aria-label="Ajouter un programme">
                        <span class="material-symbols-outlined program-card--add__icon">add</span>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Modal: Add program options -->
    <div class="modal-overlay" id="modal-add-program" aria-hidden="true">
        <div class="modal" role="dialog" aria-labelledby="modal-add-program-title">
            <button type="button" class="modal__close" id="modal-close" aria-label="Fermer">
                <span class="material-symbols-outlined">close</span>
            </button>
            <h3 id="modal-add-program-title" class="modal__title">Ajouter un programme</h3>
            <div class="modal__actions">
                <button type="button" class="btn btn--pill btn--outline" id="modal-choose-existing">Choisir un programme existant</button>
                <a href="config-program.html" class="btn btn--pill btn--rose">Créer un nouveau programme</a>
            </div>
        </div>
    </div>

    <!-- Modal: Choose existing program (simple list) -->
    <div class="modal-overlay" id="modal-choose-program" aria-hidden="true">
        <div class="modal" role="dialog" aria-labelledby="modal-choose-title">
            <button type="button" class="modal__close" id="modal-choose-close" aria-label="Fermer">
                <span class="material-symbols-outlined">close</span>
            </button>
            <h3 id="modal-choose-title" class="modal__title">Choisir un programme existant</h3>
            <div class="modal-chips" id="modal-program-chips">
                <button type="button" class="tag-chip modal-chip" data-program-name="Programme 1">Programme 1</button>
                <button type="button" class="tag-chip modal-chip" data-program-name="Programme 2">Programme 2</button>
                <button type="button" class="tag-chip modal-chip" data-program-name="Programme 3">Programme 3</button>
                <button type="button" class="tag-chip modal-chip" data-program-name="Programme 4">Programme 4</button>
                <button type="button" class="tag-chip modal-chip" data-program-name="Programme 5">Programme 5</button>
                <button type="button" class="tag-chip modal-chip" data-program-name="Programme 6">Programme 6</button>
                <button type="button" class="tag-chip modal-chip" data-program-name="Programme 7">Programme 7</button>
                <button type="button" class="tag-chip modal-chip" data-program-name="Programme 8">Programme 8</button>
            </div>
        </div>
    </div>

    <footer class="config-footer">
        <a href="select-enfant.html" class="btn btn--outline btn--pill">Annuler</a>
        <button type="button" class="btn btn--rose btn--pill" id="btn-save">Enregistrer</button>
    </footer>

    <script src="../scripts/main.js"></script>
    <script src="../scripts/config-enfant.js"></script>
</body>
</html>
