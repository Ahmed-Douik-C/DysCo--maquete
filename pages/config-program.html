<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Image Picker List</title>
            <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

        <link rel="stylesheet" href="../css/main.css" />
        <link rel="stylesheet" href="../css/config-program.css" />
    </head>
    <body>
        <header>
            <a href="../index.html" aria-label="Retour à l'accueil">
            <i class="material-symbols-outlined" id="houseicon">house</i>
            </a>
            <h1>Configuration programmes</h1>
            <p id="session-status" class="session-status"></p>
        </header>
        <div class="layout">
            <!-- Panneau gauche : galerie -->
            <div class="panel">
                <p class="panel-title">Bibliothèque d'images</p>
                <div class="gallery" id="gallery"></div>
                <button class="add-gallery-btn" onclick="addGallerySlot()">
                    + Ajouter un mouvement
                </button>
            </div>

            <!-- Panneau droit : liste -->
            <div class="panel">
                <p class="panel-title">Programme</p>
                <div class="list-panel" id="list-panel"></div>
                <button class="add-slot-btn" onclick="addSlot()">
                    + Ajouter un élément
                </button>
            </div>
        </div>
        <script src="../scripts/config-program.js"></script>
        <script src="../scripts/main.js"></script>
    </body>
</html>
