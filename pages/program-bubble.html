<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DysCo - Jeu de Bulles</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/program-bubble.css">
</head>
<body>
<header>
    <h1>Programme : bubbles</h1>
    <p id="session-status" class="session-status"></p>
</header>
<main class="content">
    <p id="encouragement"></p>

    <div id="camera_div" class="camera-wrap">
        <video id="camera" autoplay playsinline></video>
        <div id="bubble-container"></div>
    </div>

    <div id="Infos">
        <h2 class="titre-score">Score : <span id="valeurScore">0</span></h2>

        <h2>Temps restant : <span id="valeurTimer">30s</span></h2>

        <a href="select-program.html">
            <button id="fin" class="btn">Finir le programme</button>
        </a>
    </div>

    <p id="move-counter" style="display: none;">0/20</p>
    <p id="final-score"></p>
</main>

<script src="../scripts/game-bubble.js"></script>
<script src="../scripts/main.js"></script>
</body>
</html>
