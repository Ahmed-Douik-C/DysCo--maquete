<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href = "../css/main.css">
    <link rel="stylesheet" href = "../css/program.css">
</head>
<body>
<header>
    <h1>Programme</h1>
    <p id="session-status" class="session-status"></p>
</header>
<main class="content">
    <p id="encouragement"></p>
    <div id="camera_div" class="camera-wrap">
    <video id="camera" autoplay playsinline></video>
    <img id="camera-overlay" alt="Photo capturée" />
    </div>
    <div id = "Infos" >
        <h2 class="titre-score">Score : <span id="valeurScore">0</span></h2>
        <ul class = "liste-score">
            <li>1</li>
            <li>2</li>
            <li>3</li>
            <li>4</li>
            <li>5</li>
        </ul>
        <h2>Timer : <span id="valeurTimer">0</span></h2>
        <a href="select-program.html">
        <button id="btn-capture" class="btn">Finir le round</button>
        <button id="fin" class="btn">Finir le programme</button>
        </a>
    </div>
    <div id="image"></div>
    <p id="move-counter">0/20</p>
    <p id="final-score"></p>
</main>
<script src="../scripts/game.js"></script>
<script src="../scripts/api.js"></script>
<script src="../scripts/main.js"></script>
</body>
</html>
