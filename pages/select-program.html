<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../css/select-pgm.css" />
        <link rel="stylesheet" href="../css/main.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Bungee&family=Sarina&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        />
        <title>Programmes</title>
    </head>
    <body>
        <template id="child-card">
            <div class="child">
                <p class="child-name"></p>
                <div class="child-card" role="button" tabindex="0"></div>
                <div class="actions">
                    <a
                        class="action action--play"
                        href="../pages/program.html"
                        data-action="play"
                        >Play</a
                    >
                    <a
                        class="action action--icon"
                        href="#"
                        data-action="settings"
                        aria-label="Settings"
                    >
                        <span
                            class="material-symbols-outlined"
                            aria-hidden="true"
                            >settings</span
                        >
                    </a>
                    <a
                        class="action action--icon"
                        href="#"
                        data-action="stats"
                        aria-label="Stats"
                    >
                        <span
                            class="material-symbols-outlined"
                            aria-hidden="true"
                            >bar_chart</span
                        >
                    </a>
                </div>
            </div>
        </template>

        <header>
            <a href="../index.html">
                <i class="material-symbols-outlined" id="houseicon">house</i>
            </a>
            <h1 id="title">Sélection de programme</h1>
            <p id="session-status" class="session-status"></p>
        </header>

        <section class="section" id="main">
            <h1 id="warning">Appelles un adulte !</h1>
            <div class="search-bar">
                <span class="material-symbols-outlined search-bar__icon"
                    >search</span
                >
                <input
                    type="text"
                    id="search-input"
                    class="search-bar__input"
                    placeholder="Rechercher un programme…"
                    aria-label="Rechercher un programme"
                />
                <button type="button" id="btn-personnalise" class="btn-personnalise" aria-label="Afficher mes programmes">
                    <span class="material-symbols-outlined">filter_list</span>
                    Personnalisé
                </button>
            </div>
            <div id="programmes">
                <child-card
                    child-name="Bubbles"
                    hide-stats
                    play-href="./program-bubble.html"
                    image="../resources/bulle.png"
                    data-assigned="Emma,Thomas"
                ></child-card>
                <child-card
                    child-name="Coordination - Difficile"
                    hide-stats
                    play-href="./program.html"
                    image="../resources/movement_011.jpg"
                    data-assigned="Emma,Ayoub"
                ></child-card>
                <child-card
                    child-name="Coordination - Facile"
                    hide-stats
                    play-href="./program.html"
                    image="../resources/movement_012.jpg"
                    data-assigned="Emma"
                ></child-card>
                <child-card
                    child-name="Motricité - Lent"
                    hide-stats
                    play-href="./program.html"
                    image="../resources/movement_013.jpg"
                    data-assigned="Thomas"
                ></child-card>
                <child-card
                    child-name="Motricité fine - Écriture"
                    hide-stats
                    play-href="./program.html"
                    image="../resources/movement_014.jpg"
                    data-assigned="Thomas,Ayoub"
                ></child-card>
                <child-card
                    child-name="Motricité - Rapide"
                    hide-stats
                    play-href="./program.html"
                    image="../resources/movement_015.jpg"
                    data-assigned="Ayoub"
                ></child-card>
                <child-card
                    child-name="Attention - Mémoire"
                    hide-stats
                    play-href="./program.html"
                    image="../resources/movement_016.jpg"
                ></child-card>
                <child-card
                    child-name="Spatialisation - Gauche/Droite"
                    hide-stats
                    play-href="./program.html"
                    image="../resources/movement_017.jpg"
                ></child-card>
                <child-card
                    child-name="Spatialisation - Orientation"
                    hide-stats
                    play-href="./program.html"
                    image="../resources/movement_018.jpg"
                ></child-card>
            </div>
            <a
                href="config-program.html"
                class="btn-add-program"
                aria-label="Ajouter un programme"
                onclick="sessionStorage.removeItem('selectedProgram'); sessionStorage.removeItem('program')"
            >
                <span class="material-symbols-outlined">add</span>
                Ajouter un programme
            </a>
        </section>
        <script src="../scripts/main.js"></script>
        <script src="../components/child-card/child-card.js"></script>
        <script>
            if (!AdminMode) {
                document.getElementById("warning").style.display = "block";
            } else {
                document.getElementById("warning").style.display = "none";
            }

            const selectedChild = sessionStorage.getItem('selectedChild') || '';
            let personnaliseActive = false;

            function applyFilters() {
                const query = document.getElementById('search-input').value.toLowerCase().trim();
                document.querySelectorAll('#programmes child-card').forEach(card => {
                    const name = (card.getAttribute('child-name') || '').toLowerCase();
                    const assigned = card.getAttribute('data-assigned') || '';
                    const matchSearch = name.includes(query);
                    const matchPersonnalise = !personnaliseActive || assigned.split(',').map(s => s.trim()).includes(selectedChild);
                    card.style.display = (matchSearch && matchPersonnalise) ? '' : 'none';
                });
            }

            document.getElementById('btn-personnalise').addEventListener('click', () => {
                personnaliseActive = !personnaliseActive;
                document.getElementById('btn-personnalise').classList.toggle('active', personnaliseActive);
                applyFilters();
            });

            document.getElementById('search-input').addEventListener('input', applyFilters);
        </script>
    </body>
</html>
