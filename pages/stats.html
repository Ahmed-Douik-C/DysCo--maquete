<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Statistiques</title>
        <link rel="stylesheet" href="../css/main.css" />
        <link rel="stylesheet" href="../css/stats.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Bungee&family=Sarina&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        />
    </head>
    <body>
        <header>
            <a href="../index.html" aria-label="Retour à l'accueil">
                <i class="material-symbols-outlined" id="houseicon">house</i>
            </a>
            <h1 id="title">Statistiques</h1>
            <p id="session-status" class="session-status"></p>
        </header>

        <main class="stats-main">
            <div class="stats-tabs">
                <button class="stats-tab active" data-tab="therapist">
                    Avec l'ergothérapeute
                </button>
                <button class="stats-tab" data-tab="home">À la maison</button>
            </div>

            <div class="tag-chips" id="tag-chips">
                <button type="button" class="tag-chip" data-tag="Dyspraxie">
                    Dyspraxie
                </button>
                <button type="button" class="tag-chip" data-tag="TDAH">
                    TDAH
                </button>
                <button type="button" class="tag-chip" data-tag="Dysgraphie">
                    Dysgraphie
                </button>
                <button type="button" class="tag-chip" data-tag="Dyslexie">
                    Dyslexie
                </button>
                <button
                    type="button"
                    class="tag-chip"
                    data-tag="Troubles de l'attention"
                >
                    Troubles de l'attention
                </button>
                <button
                    type="button"
                    class="tag-chip"
                    data-tag="Troubles moteurs"
                >
                    Troubles moteurs
                </button>
            </div>

            <div class="stats-grid" id="stats-content">
                <section class="stats-card stats-card--chart">
                    <h2 class="stats-card__title">Progression</h2>
                    <div class="chart-wrap">
                        <canvas id="eloChart"></canvas>
                    </div>
                </section>

                <section class="stats-card stats-card--info">
                    <h2 class="stats-card__title">Résumé</h2>

                    <div class="trend-block">
                        <span class="trend-arrow" id="trend-arrow">↗</span>
                        <div class="trend-info">
                            <p class="trend-label" id="trend-label"></p>
                            <p class="trend-value" id="trend-value"></p>
                            <p class="trend-context" id="trend-context"></p>
                            <p class="trend-period" id="trend-period">
                                5 dernières vs 5 précédentes
                            </p>
                        </div>
                    </div>

                    <div class="summary-stats">
                        <div class="summary-stat">
                            <span class="summary-stat__value" id="programs-done"
                                >0</span
                            >
                            <span class="summary-stat__label"
                                >Parties jouées</span
                            >
                        </div>
                        <div class="summary-stat">
                            <span class="summary-stat__value" id="avg-score"
                                >0</span
                            >
                            <span class="summary-stat__label">Score moyen</span>
                        </div>
                        <div class="summary-stat">
                            <span class="summary-stat__value" id="best-score"
                                >0</span
                            >
                            <span class="summary-stat__label"
                                >Meilleur score</span
                            >
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
        <script src="../scripts/stats.js"></script>
        <script src="../scripts/main.js"></script>
    </body>
</html>
